<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h2{
            color :chocolate;
            font-size: 32px;
        }
        p{
            color:green;
            font-size: 20px;
        }
        #warn{
            color:red;
            font-size: large;
        }
        .high{
            background-color:yellowgreen;
            color: black;
            font-style: italic;
        }
    </style>
</head>
<body>
    <h1 style="color:blue;">Welcome to Document😁</h1>
    <p style="color: red; font-size: 20px;" >This is with inline CSS.</p>
    <p>This is a line</p>
    <br>
    <h2> Welcome to Document🙄</h2>
    <p>This is with internal css</p>
    <p>This is a line</p>
    <p id="warn">This is a warning- CREATED BY ID Selector</p>
    <p class="high">This is a highlight- CREATED BY CLASS Selector</p>
    <br><br>
    <h3>"Background added with external CSS"</h3>
</body>
</html>
